# 3D-VL 变长 3D Token 训练（Variable-Length）+ 张量并行（Tensor Parallel）
#
# 改造说明：
#   - 从 Accelerate+DeepSpeed ZeRO-2 迁移到 PyTorch DTensor TP + FSDP2 DP
#   - TP 将每个 transformer 层的注意力头数和 MLP 宽度拆分到多块 GPU
#   - FSDP2 在 DP 维度做参数分片，替代 ZeRO-2
#   - GC 不再受 warmup+DeepSpeed 兼容性 bug 影响，无条件启用
#
# 启动方式：
#   python scripts/run_3d_align_train.py --config configs/3d_align_train_variable_length.yaml
#
# 多机（如 PyTorchJob 2 机各 4 卡）：
#   launcher 会自动检测每节点 GPU 数、从 hostname 推断 node_rank，
#   构造正确的 torchrun --nproc_per_node=4 --nnodes=2 --node_rank=... 命令。
#   也可在下方 gpus_per_node / num_nodes 显式指定。

# === 路径（请按本机路径修改）===
vl_model: "/yangjunjie/model_qwen3vl_2B"
vae_config: "configs/vae/sdf_vqvae_stage2.json"
vae_ckpt: "outputs/sdf_vqvae_stage2_512_0.5-amp/ckpts/vqvae_step0000100.pt"
data_dir: "train_sdf_dataset/res512_thre0.5"
output_dir: "outputs_3d_align"

# === 离散 + 变长 3D ===
use_discrete_3d_tokens: true
use_variable_length_3d_tokens: true
max_safe_3d_length: 15000
coord_max_3d: 64
max_length_variable: 16384
reconstruction_ratio: 0.0
training_stage: "warmup"
# SFT 阶段：改为 training_stage: "sft" 并指定 warmup 输出目录以加载 tokenizer 与 embed/lm_head
# warmup_output_dir: "outputs_3d_align/ep1_lr1e-4_bs1_nall_lora16_20260306_153214"

# === 张量并行 + 序列并行 ===
# TP=8: 8 GPU 上全量张量并行（2 机各 4 卡，DP=1）
tensor_parallel_size: 8
sequence_parallel_size: 1

# === 多机配置 ===
# gpus_per_node: 0 表示自动检测（nvidia-smi / torch.cuda.device_count）
# num_nodes: 0 表示自动推算（num_processes / gpus_per_node）
# master_addr / master_port: 留空则读 $MASTER_ADDR / $MASTER_PORT 环境变量
gpus_per_node: 8
num_nodes: 1
# master_addr: "pytorch-38492b6f-master-0"
# master_port: 29500

# === 显存与 batch ===
# TP=2 + FSDP2 约降低每卡峰值激活内存 2 倍，加上 GC 后可承受更长序列。
# gradient_accumulation_steps 等效 global batch = DP=2 × bs=1 × accum=8 = 16
batch_size: 1
gradient_accumulation_steps: 32
use_flash_attn_2: true
use_gradient_checkpointing: true   # TP 模式下 GC 无条件生效（无 DeepSpeed 兼容性 bug）

# === 训练参数 ===
lr: 1.0e-4
epochs: 1
max_3d_tokens: 512
truncate_mode: "head"
use_3d_pos: false
projector_layers: 1
weight_decay: 0.01
grad_clip: 1.0
use_lr_scheduler: true
warmup_ratio: 0.05

use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.1

prompt: "Describe this 3D shape in one sentence:"

# # === 调试（排查 "too many values to unpack"、loss=NaN/Inf 等）===
# debug_vl_forward: true       # 打印 combined_embeds 等输入形状
# debug_qwen3vl_patch: true    # 打印 transformers 版本等补丁日志
# debug_memory: true           # OOM 调试：每步打印显存统计，定位爆显存步骤（@before_backward 后 OOM 多为反向梯度）
# debug_loss: true             # loss 详细调试：valid_label_tokens、per-sample 标签、logits 统计、重算 CE(local/global) 对比
# debug_parallel: true         # 并行调试：打印 TP/SP/DP mesh、group、step 同步与关键通信日志
# debug_parallel_verbose: false # 并行详细模式（日志量很大，卡住时建议临时改为 true）
# debug_sync_points: true      # barrier 前后耗时日志，快速定位 rank 不一致停住点
# dist_timeout_seconds: 900    # 分布式 collectives 超时（秒），排查时可适当放大
# echo_all: true               # 控制台回显全部输出（含 [DEBUG]），需配合 tee 使用：... 2>&1 | tee align_debug.log

# === 数据 ===
max_samples: 0
num_workers: 0   # DataLoader CPU worker 数（每个 GPU 进程独立创建 DataLoader）
                 # 说明：collate_fn（VAE Encode + FPS + Morton）在主进程执行，与 worker 无关。
                 # worker 仅负责预取 .npz → tensor（I/O 密集）。
                 # TP=8 时 dp_world=1，8 个 GPU 进程均加载相同数据：
                 #   total_workers = 8 × num_workers，过大会争抢磁盘带宽并浪费 CPU 核心。
                 # 推荐：num_workers=2（16 个预取 worker）；若磁盘 I/O 成为瓶颈可调至 4。
                 # 注：num_workers>0 时需确保 collate_fn 中无共享 CUDA 资源（当前已满足）。
dummy_data: false
dummy_samples: 50
data_format: "sdf_caption"

# === Accelerate（legacy，tensor_parallel_size>1 时不生效）===
# 保留此节供 tensor_parallel_size=1 的单卡/DDP fallback 使用。
use_deepspeed: false       # TP+FSDP2 取代 DeepSpeed；如需 fallback 可改回 true
accelerate:
  compute_environment: LOCAL_MACHINE
  debug: false
  distributed_type: MULTI_GPU
  downcast_bf16: "no"
  enable_cpu_affinity: false
  gpu_ids: all
  machine_rank: 0
  main_training_function: main
  mixed_precision: bf16
  num_machines: 1
  num_processes: 8   # 4 GPU: TP=2 + SP=2
  rdzv_backend: static
  same_network: true
  tpu_env: []
  tpu_use_cluster: false
  tpu_use_sudo: false
  use_cpu: false
